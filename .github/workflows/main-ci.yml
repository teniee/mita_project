name: Main CI/CD Pipeline

on:
  push:
    # claude/** feature branches run the full pipeline so readiness work
    # gets real CI evidence before any merge to main.
    branches: [ main, 'claude/**' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main ]

# Prevent multiple runs for same commit
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend Python CI
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    # Real service containers — the backend test suite exercises real
    # PostgreSQL and Redis integrations (repositories, onboarding persistence,
    # rate limiting, token blacklist, async flows) rather than mocking them.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_mita
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # conftest defaults point here; set explicitly so intent is clear.
      DATABASE_URL: postgresql://test:test@localhost:5432/test_mita?sslmode=disable
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: ci_test_secret_key_minimum_32_chars_long_xx
      JWT_SECRET: ci_test_jwt_secret_minimum_32_chars_long_xx
      ENVIRONMENT: test
      TESTING: "true"
      FIREBASE_JSON: "{}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'requirements-dev.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Code quality checks
        run: |
          # Format check
          black --check .

          # Import sorting
          isort --check .

          # Linting
          ruff check .

      - name: Apply database migrations (clean DB → head)
        run: |
          export PYTHONPATH=.
          python -m alembic upgrade head

      - name: Run tests
        run: |
          export PYTHONPATH=.
          pytest --maxfail=5 --disable-warnings -q

      - name: Security scan (Bandit)
        run: bandit -r app/ -ll

  # Mobile Flutter CI
  mobile-ci:
    name: Mobile CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Set up Java (Android toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Verify code
        run: |
          # Format check
          dart format --set-exit-if-changed .

          # Analyze
          flutter analyze --no-fatal-infos --no-fatal-warnings

      # Live-API integration tests probe the backend and skip themselves
      # when it is unreachable, so this run covers unit + widget tests.
      - name: Run tests
        run: flutter test

      - name: Android debug build
        run: flutter build apk --debug --dart-define=ENV=development

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mita-debug-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # Build check
  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend-ci, mobile-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (test)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mita-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Status check
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [backend-ci, mobile-ci]
    if: always()

    steps:
      - name: Check CI Status
        run: |
          if [[ "${{ needs.backend-ci.result }}" == "success" ]] && [[ "${{ needs.mobile-ci.result }}" == "success" ]]; then
            echo "✅ All CI checks passed"
            exit 0
          else
            echo "❌ Some CI checks failed"
            echo "Backend: ${{ needs.backend-ci.result }}"
            echo "Mobile: ${{ needs.mobile-ci.result }}"
            exit 1
          fi
